services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-oss
    restart: unless-stopped
    environment:
      POSTGRES_USER: gad-dev
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: business-objectives
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init-scripts:/docker-entrypoint-initdb.d
      - postgres_data_oss:/var/lib/postgresql/data
    networks:
      - oss-network

  sonarqube:
    image: sonarqube:latest
    container_name: sonarqube-oss
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - oss-network
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

networks:
  oss-network:
    driver: bridge

volumes:
  postgres_data_oss:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: